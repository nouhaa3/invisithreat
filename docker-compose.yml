services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: invisithreat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-invisithreat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-invisithreat_password}
      POSTGRES_DB: ${POSTGRES_DB:-invisithreat_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-invisithreat} -d ${POSTGRES_DB:-invisithreat_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - invisithreat-network

  # OWASP ZAP for DAST scanning
  zap:
    image: ghcr.io/zaproxy/zaproxy:latest
    container_name: invisithreat-zap
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      - ZAP_PORT=8080
    command: zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.disablekey=true -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true
    networks:
      - invisithreat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invisithreat-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - type: bind
        source: ./backend
        target: /app
      - type: bind
        source: ./scripts
        target: /scripts
        read_only: true
    depends_on:
      db:
        condition: service_healthy
      zap:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ZAP_ENABLED=true
      - ZAP_URL=http://zap:8080
      - DAST_SPIDER_TIMEOUT=90
      - DAST_ASCAN_TIMEOUT=180
      - DAST_NO_PROGRESS_TIMEOUT=60
      - DAST_PASSIVE_WAIT_SECONDS=8
      - DAST_SPIDER_RECURSE=true
      - DAST_ASCAN_RECURSE=false
      - DB_POOL_SIZE=2
      - DB_MAX_OVERFLOW=1
      - DB_POOL_TIMEOUT=30
      - DB_POOL_RECYCLE=1800
    networks:
      - invisithreat-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: invisithreat-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - invisithreat-network

volumes:
  postgres_data:
    driver: local

networks:
  invisithreat-network:
    driver: bridge
