<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="5" fill="#0d0d0d"/>

  <!-- Shield — fills most of the square -->
  <path d="M16 2 L28 6.5 L28 17.5 C28 23.8 22.5 28.8 16 31 C9.5 28.8 4 23.8 4 17.5 L4 6.5 Z"
        fill="#1c1c1c" stroke="#FF6B2B" stroke-width="1.4"/>

  <!-- Inner shield rim -->
  <path d="M16 4.5 L26 8.5 L26 17.5 C26 22.5 21.5 27 16 28.8 C10.5 27 6 22.5 6 17.5 L6 8.5 Z"
        fill="none" stroke="rgba(255,107,43,0.2)" stroke-width="0.7"/>

  <!-- Eye shape -->
  <path d="M7.5 17 C10 12 22 12 24.5 17 C22 22 10 22 7.5 17Z"
        fill="rgba(255,107,43,0.07)" stroke="#FF6B2B" stroke-width="1.2"/>

  <!-- Iris -->
  <circle cx="16" cy="17" r="3.5" fill="none" stroke="#FF6B2B" stroke-width="1.2"/>

  <!-- Pupil glow -->
  <circle cx="16" cy="17" r="1.6" fill="#FF6B2B"/>
  <circle cx="16" cy="17" r="2.6" fill="rgba(255,107,43,0.25)"/>

  <!-- Scan beam right -->
  <line x1="19.5" y1="17" x2="25.5" y2="17"
        stroke="#FF6B2B" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="22" y1="17" x2="27" y2="17"
        stroke="#FF6B2B" stroke-width="0.6" stroke-linecap="round" opacity="0.4"/>
</svg>
