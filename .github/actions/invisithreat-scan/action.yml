name: InvisiThreat Scan Upload
description: Run official InvisiThreat scanner in CI and upload results using a short-lived upload token.

inputs:
  upload-token:
    description: Upload token from POST /api/projects/{project_id}/scans/{scan_id}/claim-token
    required: true
  api-url:
    description: InvisiThreat API base URL
    required: false
    default: http://localhost:8000
  scan-path:
    description: Path to scan in the repository workspace
    required: false
    default: .
  python-version:
    description: Python version used by the action
    required: false
    default: "3.12"

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Download official scanner
      shell: bash
      run: |
        set -euo pipefail
        curl -fsSL "${{ inputs.api-url }}/api/scanner/download" -o scan.py

    - name: Install scanner dependency
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        python -m pip install requests

    - name: Run scan and upload results
      shell: bash
      run: |
        set -euo pipefail
        python scan.py "${{ inputs.scan-path }}" --token "${{ inputs.upload-token }}" --api-url "${{ inputs.api-url }}"
