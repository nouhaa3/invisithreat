name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests (Python + Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: invisithreat_db
          POSTGRES_USER: invisithreat
          POSTGRES_PASSWORD: invisithreat_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U invisithreat -d invisithreat_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_NAME: InvisiThreat
      APP_VERSION: 0.1.0
      ENVIRONMENT: ci
      SECRET_KEY: ci-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      DATABASE_URL: postgresql://invisithreat:invisithreat_password@localhost:5432/invisithreat_db
      POSTGRES_SSLMODE: disable
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://localhost:8000
      BREVO_API_KEY: ""
      EMAIL_FROM: no-reply@example.com
      PRIMARY_ADMIN_EMAIL: admin@example.com
      ADMIN_EMAIL: admin@example.com
      SMTP_HOST: ""
      SMTP_PORT: 587
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SMTP_USE_TLS: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run backend tests
        working-directory: backend
        run: pytest -q

  frontend-build:
    name: Frontend Build (Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
