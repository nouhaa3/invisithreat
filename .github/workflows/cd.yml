name: CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to build
        required: false
        default: latest
      push_to_registry:
        description: Push images to GHCR
        required: false
        default: "false"

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  docker-build:
    name: Docker Build (${{ matrix.component }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context: backend
            dockerfile: backend/Dockerfile
            image: ghcr.io/${{ github.repository }}/backend
          - component: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            image: ghcr.io/${{ github.repository }}/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' || github.event.inputs.push_to_registry == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=${{ github.event.inputs.image_tag || 'latest' }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=ref,event=branch,enable=${{ github.event_name == 'push' }}
            type=sha,format=short

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' || github.event.inputs.push_to_registry == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
