[pytest]
# Fast test execution configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Optimizations
addopts = 
    -v
    --tb=short
    --disable-warnings
    -p no:cacheprovider
    --maxfail=5
    --ff

# Markers
markers =
    integration: integration tests
    slow: slow tests

# Logging
log_cli = false
log_cli_level = ERROR
